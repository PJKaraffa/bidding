<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Transportation Bidding System</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =====================================================
       LOGIN PAGE
  ====================================================== -->

  <div id="loginPage" class="login-card">

    <h1>Transportation Bidding</h1>
    <h2>Staff / Vendor Login</h2>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button
      type="button"
      onclick="login()"
    >
      Login
    </button>

    <p id="loginMessage"></p>

  </div>

  <!-- =====================================================
       APPLICATION
  ====================================================== -->

  <div id="appPage" class="hidden">

    <header>

      <div>
        <h1>Transportation Bidding System</h1>
        <p id="welcomeMessage"></p>
      </div>

      <button
        type="button"
        onclick="logout()"
      >
        Logout
      </button>

    </header>

    <main>

      <!-- =================================================
           ADMIN CREATE / EDIT BID
      ================================================== -->

      <section
        id="adminPanel"
        class="card hidden"
      >

        <h2 id="bidFormHeading">
          Create Transportation Bid
        </h2>

        <p
          id="editMessage"
          class="hidden"
        >
          You are editing an existing transportation bid.
        </p>

        <input
          id="bidTitle"
          type="text"
          placeholder="Bid Title"
        >

        <textarea
          id="bidDescription"
          placeholder="Bid Description / Notes"
        ></textarea>

        <div class="grid">

          <input
            id="studentId"
            type="text"
            placeholder="Student ID"
          >

          <input
            id="streetAddress"
            type="text"
            placeholder="Street Address"
          >

        </div>

        <div class="grid">

          <div>

            <label for="pickupTime">
              Pickup Time
            </label>

            <input
              id="pickupTime"
              type="time"
            >

          </div>

          <div>

            <label for="schoolStartTime">
              School Start Time
            </label>

            <input
              id="schoolStartTime"
              type="time"
            >

          </div>

        </div>

        <input
          id="school"
          type="text"
          placeholder="School"
        >

        <div class="grid">

          <div>

            <label for="serviceDate">
              Service Date
            </label>

            <input
              id="serviceDate"
              type="date"
            >

          </div>

          <div>

            <label for="bidOpenDate">
              Bid Opens
            </label>

            <input
              id="bidOpenDate"
              type="datetime-local"
            >

          </div>

          <div>

            <label for="bidCloseDate">
              Bid Closes
            </label>

            <input
              id="bidCloseDate"
              type="datetime-local"
            >

          </div>

        </div>

        <div class="form-actions">

          <button
            id="saveBidButton"
            type="button"
            onclick="saveBid()"
          >
            Post Bid
          </button>

          <button
            id="cancelEditButton"
            type="button"
            class="gray hidden"
            onclick="cancelBidEdit()"
          >
            Cancel Edit
          </button>

        </div>

      </section>

      <!-- =================================================
           TRANSPORTATION BID LIST
      ================================================== -->

      <section class="card">

       <div class="section-heading">
    <h2>Transportation Bids</h2>

    <button
        type="button"
        class="gray"
        onclick="toggleAllBids()"
        id="toggleAllButton">
        Collapse All
    </button>
</div>

        <div id="bidsList"></div>

      </section>

    </main>

  </div>

  <!-- =====================================================
       JAVASCRIPT
  ====================================================== -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase-config.js"></script>

  <script src="script.js"></script>

</body>
</html>
