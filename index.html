<!DOCTYPE html>
<html>
<head>
  <title>Transportation Bidding System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="login-card">
  <h1>Transportation Bidding</h1>
  <h2>Staff / Vendor Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<div id="appPage" class="hidden">

  <header>
    <div>
      <h1>Transportation Bidding System</h1>
      <p id="welcomeMessage"></p>
    </div>
    <button onclick="logout()">Logout</button>
  </header>

  <main>

    <section id="adminPanel" class="card hidden">
      <h2>Create Transportation Bid</h2>

      <input id="bidTitle" placeholder="Bid Title">

      <textarea id="bidDescription" placeholder="Bid Description / Notes"></textarea>

      <div class="grid">
        <input id="studentId" placeholder="Student ID">
        <input id="streetAddress" placeholder="Street Address">
      </div>

      <div class="grid">
        <div>
          <label>Pickup Time</label>
          <input id="pickupTime" type="time">
        </div>

        <div>
          <label>School Start Time</label>
          <input id="schoolStartTime" type="time">
        </div>
      </div>

      <input id="school" placeholder="School">

      <div class="grid">
        <div>
          <label>Service Date</label>
          <input id="serviceDate" type="date">
        </div>

        <div>
          <label>Bid Opens</label>
          <input id="bidOpenDate" type="datetime-local">
        </div>

        <div>
          <label>Bid Closes</label>
          <input id="bidCloseDate" type="datetime-local">
        </div>
      </div>

      <div class="form-actions">
  <button id="saveBidButton" onclick="saveBid()">Post Bid</button>

  <button
    id="cancelEditButton"
    class="gray hidden"
    onclick="cancelBidEdit()"
  >
    Cancel Edit
  </button>
</div>
    </section>

    <section class="card">
      <h2>Transportation Bids</h2>
      <div id="bidsList"></div>
    </section>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
